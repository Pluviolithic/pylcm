name: Python Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check lockfile
        run: uv lock --check

      - name: Lint files
        run: ruff check

      - name: Check Python file formatting
        run: ruff format --check --diff

      - name: Check pyproject file formatting
        run: uv run pyproject-fmt --column-width 88 --indent 4 pyproject.toml --check

  test:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run lcm tcp relay
        run: nohup java -classpath .venv/lib/python${{ matrix.python-version }}/site-packages/share/java/lcm.jar lcm.lcm.TCPService &

      - uses: iFaxity/wait-on-action@v1
        with:
          resource: tcp:7700

      - name: Test with pytest
        run: uv run pytest
